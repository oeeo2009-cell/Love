here<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قلب - أحبك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }
        
        canvas {
            width: 100%;
            height: auto;
            display: block;
            background: black;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 62, 150, 0.3);
        }
        
        .love-text {
            margin-top: 30px;
            font-size: 4em;
            font-weight: bold;
            color: #ff3366;
            text-shadow: 0 0 20px #ff3366,
                         0 0 40px #ff3366,
                         0 0 60px #ff3366;
            animation: heartbeat 1.5s ease-in-out infinite;
            letter-spacing: 5px;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            35% { transform: scale(1); }
            45% { transform: scale(1.05); }
            55% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        /* للجوال */
        @media (max-width: 600px) {
            .love-text {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="heartCanvas" width="600" height="400"></canvas>
        <div class="love-text">أحبك ❤️</div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // ضبط حجم الكانفس
        canvas.width = 600;
        canvas.height = 400;
        
        // دالة الراندوم مثل الكود الأصلي
        function rand(max = 1) {
            return Math.random() * max;
        }
        
        // نفس الكود من الصورة بالضبط
        const heartPointsCount = 250;
        const width = canvas.width;
        const height = canvas.height;
        let e = [];
        
        // حساب نقاط القلب الحقيقية
        let heartTargets = [];
        for (let i = 0; i < heartPointsCount; i++) {
            let t = (i / heartPointsCount) * Math.PI * 2;
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            
            // تكبير وتحريك للوسط
            let scale = 12;
            let centerX = width / 2;
            let centerY = height / 2 - 20;
            
            heartTargets.push({
                x: centerX + x * scale,
                y: centerY - y * scale
            });
        }
        
        // إنشاء الجزيئات - نفس الكود الأصلي
        for (let i = 0; i < heartPointsCount; i++) {
            let x = rand() * width;
            let y = rand() * height;
            
            // نفس الخصائص بالضبط
            e[i] = {
                x: x,
                y: y,
                vx: 0,
                vy: 0,
                R: 2,  // نفس R
                speed: rand() + 5,  // نفس speed
                q: ~(rand() * heartPointsCount),  // نفس q
                D: 2 * (1 % 2) - 1,  // نفس D
                force: 0.2 * rand() + 0.7,  // نفس force
                f: "hsl(" + (340 + rand() * 20) + ", " + (70 + rand() * 30) + "%, " + (50 + rand() * 30) + "%)",  // الألوان الحمراء
                trace: [],  // نفس trace
                targetX: heartTargets[i].x,
                targetY: heartTargets[i].y
            };
        }
        
        // دالة الرسم
        function draw() {
            // مسح الشاشة مع تأثير خفيف
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < e.length; i++) {
                let p = e[i];
                
                // ------------------------------------------------------
                // نفس نظام الحركة من الكود الأصلي
                // ------------------------------------------------------
                
                // حركة عشوائية
                p.vx += (rand() - 0.5) * p.force * 0.5;
                p.vy += (rand() - 0.5) * p.force * 0.5;
                
                // جذب نحو نقطة القلب
                let dx = p.targetX - p.x;
                let dy = p.targetY - p.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > 1) {
                    p.vx += (dx / distance) * 0.02;
                    p.vy += (dy / distance) * 0.02;
                }
                
                // تحديث الموقع
                p.x += p.vx * p.speed * 0.15;
                p.y += p.vy * p.speed * 0.15;
                
                // تخفيف السرعة
                p.vx *= 0.97;
                p.vy *= 0.97;
                
                // نظام التتبع (trace)
                p.trace.push({x: p.x, y: p.y});
                if (p.trace.length > 4) {
                    p.trace.shift();
                }
                
                // رسم مسار التتبع
                for (let j = 0; j < p.trace.length; j++) {
                    let t = p.trace[j];
                    let alpha = j / p.trace.length;
                    
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, p.R * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 80, 150, ${alpha * 0.5})`;
                    ctx.fill();
                }
                
                // رسم النقطة الرئيسية
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.R * 2, 0, Math.PI * 2);
                ctx.fillStyle = p.f;
                ctx.shadowColor = '#ff3366';
                ctx.shadowBlur = 15;
                ctx.fill();
            }
            
            requestAnimationFrame(draw);
        }
        
        // بدء التشغيل
        draw();
    </script>
</body>
</html>
